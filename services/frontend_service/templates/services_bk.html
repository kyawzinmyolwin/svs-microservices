{% extends "base.html" %}

{% block content %}
<h2>Services</h2>

<table border="1">
    <tr>
        <th>ID</th><th>Name</th><th>Price</th>
    </tr>
    {% for s in services %}
    <tr>
        <td>{{ s.service_id }}</td>
        <td>{{ s.service_name }}</td>
        <td>{{ s.price }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
