name: Build & Deploy Services

on:
  push:
    branches: [ main ]
  pull_request:

env:
  AWS_REGION: ap-southeast-1
  ECR_REGISTRY: public.ecr.aws/q9t0q9c2

jobs:
  detect-changes:
    runs-on: self-hosted
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      catalog: ${{ steps.filter.outputs.catalog }}
      appointment: ${{ steps.filter.outputs.appointment }}
      customer: ${{ steps.filter.outputs.customer }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed services
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - app-services/frontend_service/**
            catalog:
              - app-services/catalog_service/**
            appointment:
              - app-services/appointments_service/**
            customer:
              - app-services/customer_service/**

  build-and-push:
    needs: detect-changes
    runs-on: self-hosted
    strategy:
      matrix:
        include:
          - name: frontend_service
            path: app-services/frontend_service
            enabled: ${{ needs.detect-changes.outputs.frontend }}
          - name: catalog_service
            path: app-services/catalog_service
            enabled: ${{ needs.detect-changes.outputs.catalog }}
          - name: appointments_service
            path: app-services/appointments_service
            enabled: ${{ needs.detect-changes.outputs.appointment }}
          - name: customer_service
            path: app-services/customer_service
            enabled: ${{ needs.detect-changes.outputs.customer }}

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-southeast-1
          role-to-assume: arn:aws:iam::366077889879:role/github-action-role

      - name: Build & push ${{ matrix.name }}
        if: matrix.enabled == 'true'
        run: |
          echo "Building ${{ matrix.name }}"

          docker build \
            -t ${{ env.ECR_REGISTRY }}/${{ matrix.name }}:${{ github.sha }} \
            -f ${{ matrix.path }}/Dockerfile \
            ${{ matrix.path }}

          # Login to public ECR
          aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

          docker push ${{ env.ECR_REGISTRY }}/${{ matrix.name }}:${{ github.sha }}


          - name: Build Helm set flags
                  id: helm-flags
                  run: |
                    FLAGS=""
                    
                    if [ "${{ needs.detect-changes.outputs.customer }}" == "true" ]; then
                      FLAGS="$FLAGS --set customer.image.tag=${{ github.sha }}"
                    fi
                    
                    if [ "${{ needs.detect-changes.outputs.catalog }}" == "true" ]; then
                      FLAGS="$FLAGS --set catalog.image.tag=${{ github.sha }}"
                    fi
                    
                    if [ "${{ needs.detect-changes.outputs.appointment }}" == "true" ]; then
                      FLAGS="$FLAGS --set appointment.image.tag=${{ github.sha }}"
                    fi
                    
                    if [ "${{ needs.detect-changes.outputs.frontend }}" == "true" ]; then
                      FLAGS="$FLAGS --set frontend.image.tag=${{ github.sha }}"
                    fi
                    
                    echo "flags=$FLAGS" >> $GITHUB_OUTPUT
      # Helm upgrade handles all services at once — no per-service kubectl apply needed.
      # SHA-tagged images were pushed as :latest above so the values.yaml
      # (tag: latest + imagePullPolicy: Always) will pull the new build.
      - name: Helm upgrade
        run: |
          helm upgrade --install svs ./svs-helm \
            --namespace svs-microservices \
            --values svs-helm/values.yaml \
            ${{ steps.helm-flags.outputs.flags }} \
            --atomic \
            --timeout 5m

      - name: Update Kubernetes YAML
        if: matrix.enabled == 'true'
        # We go back to root context (no working-directory) to find the k8s folder
        run: |
          DEPLOY_FILE="k8s/deployments/kind-cluster/${{ matrix.name }}-deployment.yaml"
          IMAGE_TAG="${{ env.ECR_REGISTRY }}/${{ matrix.name }}:${{ github.sha }}"

          # Update the image in the specific service deployment file
          sed -i "s|image:.*|image: $IMAGE_TAG|g" $DEPLOY_FILE

      - name: Deploy to Cluster
        if: matrix.enabled == 'true'
        run: |
          kubectl apply -f k8s/deployments/kind-cluster/${{ matrix.name }}-deployment.yaml



