name: Deploy Microservices

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: self-hosted
    strategy:
      # This runs the same steps for each item in the list
      matrix:
        service: [frontend_service, catalog_service, customer_service, appointments_service]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build and Push Image
        # Dynamically sets the folder based on the matrix item
        working-directory: app-services/${{ matrix.service }}
        run: |
          IMAGE_NAME="192.168.56.85:5000/${{ matrix.service }}:${{ github.sha }}"
          
          docker build -t $IMAGE_NAME -f Dockerfile .
          docker push $IMAGE_NAME

      - name: Update Kubernetes YAML
        # We go back to root context (no working-directory) to find the k8s folder
        run: |
          DEPLOY_FILE="k8s/deployments/${{ matrix.service }}-deployment.yaml"
          IMAGE_TAG="192.168.56.85:5000/${{ matrix.service }}:${{ github.sha }}"
          
          # Update the image in the specific service deployment file
          sed -i "s|image:.*|image: $IMAGE_TAG|g" $DEPLOY_FILE

      - name: Deploy to Cluster
        run: |
          kubectl apply -f k8s/deployments/${{ matrix.service }}-deployment.yaml