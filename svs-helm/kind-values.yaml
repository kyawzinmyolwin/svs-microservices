# kind-values.yaml - Kind cluster overrides
namespace: svs-microservices
registry: public.ecr.aws/q9t0q9c2 #For Local Registry Use: 192.168.56.90:5000
imagePullPolicy: Always
dbHost: "192.168.56.1"

# FIX: merged vault + image settings into single key per service
# (YAML does not allow duplicate keys - second key silently overwrites first)
customer:
  vault:
    enabled: true
  image:
    tag: ${{ github.sha }}

catalog:
  vault:
    enabled: true
  image:
    tag: ${{ github.sha }}

appointment:
  vault:
    enabled: false
  image:
    tag: ${{ github.sha }}

frontend:
  image:
    tag: ${{ github.sha }}
