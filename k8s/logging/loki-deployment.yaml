apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: logging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      securityContext:
        fsGroup: 10001   # 👈 allows volume write access
      containers:
      - name: loki
        image: grafana/loki:2.9.4
        args:
          - -config.file=/etc/loki/loki.yaml
        ports:
          - containerPort: 3100
        volumeMounts:
          - name: config
            mountPath: /etc/loki
          - name: data
            mountPath: /loki
          - name: wal
            mountPath: /wal        # 👈 WAL mount
      volumes:
        - name: config
          configMap:
            name: loki-config
        - name: data
          emptyDir: {}
        - name: wal
          emptyDir: {}             # 👈 writable volume
