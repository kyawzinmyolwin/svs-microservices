apiVersion: v1
kind: Service
metadata:
  name: svs-service-customer
  namespace: svs-microservices
spec:
  selector:
    app: svs-app-customer
  ports:
    - port: 5002        # I'm (svs-service-customer) listening on port 5002. Whoever access to http://svs-service-customer:5002 I'll forward the request according to my tartgetPort.
      targetPort: 5002 #Container (svs-app-customer) is listening on port 5002
  type: ClusterIP