apiVersion: v1
kind: Service
metadata:
  name: svs-service-catalog
  namespace: svs-microservices
spec:
  selector:
    app: svs-app-catalog
  ports:
    - port: 5001      # I'm (svs-service-catalog) listening on port 5001. Whoever access to http://svs-service-catalog:5001 I'll forward the request according to my tartgetPort.
      targetPort: 5001 #Container (svs-app-catalog) is listening on port 5001
  type: ClusterIP