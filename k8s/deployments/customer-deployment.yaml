apiVersion: apps/v1
kind: Deployment
metadata:
  name: svs-app-customer
  namespace: svs-microservices
spec:
  replicas: 2
  selector:
    matchLabels:
      app: svs-app-customer
  template:
    metadata:
      labels:
        app: svs-app-customer
    spec:
      containers:
        - name: svs-app
          image: piconet/svs_microservices-customer_service:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 5002
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"