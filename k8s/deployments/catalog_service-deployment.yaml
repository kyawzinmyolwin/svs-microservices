apiVersion: apps/v1
kind: Deployment
metadata:
  name: svs-app-catalog
  namespace: svs-microservices
spec:
  replicas: 2
  selector:
    matchLabels:
      app: svs-app-catalog
  template:
    metadata:
      labels:
        app: svs-app-catalog
    spec:
      containers:
        - name: svs-app
          image: piconet/svs_microservices-catalog_service:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 5001
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          # envFrom:
          #   - configMapRef:
          #       name: catalog-config
          #   - secretRef:
          #       name: catalog-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3